<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRIP STORE — Premium Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▲</span>
        <span class="logo-text">DRIP<span class="logo-accent">STORE</span></span>
      </div>
      <button class="cart-toggle" id="cartToggle" aria-label="Open cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-sub">Lagos to London</p>
    <h1 class="hero-title">Fresh Drops.<br/>Real Prices.</h1>
    <p class="hero-desc">Add what you want, then hit WhatsApp to inquire. Simple.</p>
  </section>

  <!-- PRODUCT GRID -->
  <main class="main">
    <div class="section-label">— Collection —</div>
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- CART PANEL -->
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <span class="cart-title">Your Cart</span>
      <button class="cart-close" id="cartClose" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">Your cart is empty.<br/>Add a product to get started.</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-total-row">
        <span>Total</span>
        <span class="cart-total-price" id="cartTotalPrice">₦0</span>
      </div>
      <button class="btn-whatsapp" id="whatsappBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.123.556 4.116 1.528 5.845L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.372l-.36-.214-3.732.978.995-3.636-.235-.374A9.818 9.818 0 1112 21.818z"/>
        </svg>
        Inquire on WhatsApp
      </button>
      <button class="btn-clear" id="clearCart">Clear Cart</button>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- FIXED BOTTOM BAR -->
  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <div class="bottom-bar-info">
      <span id="bottomCount">0 items</span>
      <span class="bottom-bar-total" id="bottomTotal">₦0</span>
    </div>
    <button class="btn-whatsapp-bar" id="bottomWhatsapp">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.123.556 4.116 1.528 5.845L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.372l-.36-.214-3.732.978.995-3.636-.235-.374A9.818 9.818 0 1112 21.818z"/>
      </svg>
      Inquire on WhatsApp
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
